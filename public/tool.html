        :root {
            width: 60%;
        }
    </style>

    <script>
document.addEventListener('DOMContentLoaded', function() {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,timeGridWeek,timeGridDay'
    },
    events: [
      {
        title: 'All Day Event',
        start: '2026-04-01'
      },
    ]
  });

  calendar.render();

  var today = new Date();
  document.getElementById("startDate").value = today.toISOString().split("T")[0];

  var nowHours = String(today.getHours()).padStart(2, "0");
  var nowMinutes = String(today.getMinutes()).padStart(2, "0");
  document.getElementById("startTime").value = nowHours + ":" + nowMinutes;

  document.getElementById("medicineForm").addEventListener("submit", function(event) {
    event.preventDefault();

    var antibioticName = document.getElementById("antibioticName").value;
    var startDate = document.getElementById("startDate").value;
    var startTime = document.getElementById("startTime").value;
    var doseInterval = Number(document.getElementById("doseInterval").value);
    var durationDays = Number(document.getElementById("durationDays").value);
    var otherMeds = document.getElementById("otherMeds").value;

    var startDateTime = new Date(startDate + "T" + startTime);
    var endDateTime = new Date(startDateTime);
    endDateTime.setDate(endDateTime.getDate() + durationDays);

    var currentDose = new Date(startDateTime);

    while (currentDose <= endDateTime) {
      calendar.addEvent({
        title: antibioticName + " dose",
        start: currentDose.toISOString(),
        extendedProps: {
          otherMedications: otherMeds
        }
      });

      currentDose.setHours(currentDose.getHours() + doseInterval);
    }

    alert("Medication schedule added to calendar!");
  });

  document.getElementById("checkInteractionsBtn").addEventListener("click", async function() {
  var antibiotic = document.getElementById("antibioticName").value.trim();
  var otherMeds = document.getElementById("otherMeds").value
    .split(",")
    .map(med => med.trim())
    .filter(med => med !== "");

  var resultsDiv = document.getElementById("interactionResults");

  if (!antibiotic || otherMeds.length === 0) {
    resultsDiv.innerHTML = "Please enter an antibiotic and other medications.";
    return;
  }

  resultsDiv.innerHTML = "Checking FDA label...";

  try {
    var url =
      "https://api.fda.gov/drug/label.json?search=openfda.generic_name:%22" +
      encodeURIComponent(antibiotic) +
      "%22&limit=1";

    var response = await fetch(url);
    var data = await response.json();

    if (!data.results || data.results.length === 0) {
      resultsDiv.innerHTML = "No FDA label found for this medication.";
      return;
    }

    var label = data.results[0];
    var interactionText = "";

    if (label.drug_interactions) {
      interactionText = label.drug_interactions.join(" ");
    }

    if (!interactionText) {
      resultsDiv.innerHTML = "No drug interaction section found in the FDA label.";
      return;
    }

    var foundInteractions = [];

    otherMeds.forEach(function(med) {
      if (interactionText.toLowerCase().includes(med.toLowerCase())) {
        foundInteractions.push(med);
      }
    });

    if (foundInteractions.length === 0) {
      resultsDiv.innerHTML = `
        No matching medication names were found in the FDA drug interaction section.
        <br><br>
        <strong>FDA label interaction section:</strong>
        <p>${interactionText.substring(0, 1000)}...</p>
      `;
    } else {
      resultsDiv.innerHTML = `
        <h3>Possible interactions found:</h3>
        <p>The FDA label for <strong>${antibiotic}</strong> mentions:</p>
        <ul>
          ${foundInteractions.map(med => `<li>${med}</li>`).join("")}
        </ul>
        <p>${interactionText.substring(0, 1000)}...</p>
      `;
    }

  } catch (error) {
    console.error(error);
    resultsDiv.innerHTML = "Error checking OpenFDA.";
  }
});
});
    </script>
  </head>
  <body>
        <main class="main" id="top">

    <nav class="navbar navbar-expand-lg navbar-light fixed-top py-3 d-block" data-navbar-on-scroll="data-navbar-on-scroll" style="background-color: #8dd6fbc5;   overflow: hidden;  padding: 10px;">

    <form id="medicineForm" style="padding:20px; max-width:50%; margin:auto; margin-left:0px ; margin-right: 0px; position: relative;">
  <h2>Antibiotic Schedule</h2>

  <label>Antibiotic name:</label>
  <input type="text" id="antibioticName" required><br><br>

  <label>Start date:</label>
  <input type="date" id="startDate"><br><br>

  <label>Start time:</label>
  <input type="time" id="startTime"><br><br>

  <label>Dose interval (every X hours):</label>
  <input type="number" id="doseInterval" min="1" required><br><br>

  <label>Duration in days:</label>
  <input type="number" id="durationDays" min="1" required><br><br>

  <label>Other medications you take:</label>
  <textarea id="otherMeds"></textarea><br><br>
    <br>
<button type="button" id="checkInteractionsBtn">Check Drug Interactions</button>

<div id="interactionResults" style="margin-top:15px; padding:10px; border:1px solid #ccc;">
  Interaction results will appear here.
  <p style="font-size:12px;">
  This tool is for educational purposes only. Always ask a doctor or pharmacist before changing medication.
</p>
</div>

  <button type="submit">Add to Calendar</button>
</form>
    <div style="position: absolute; top: 10px; right: -400px; width: 700px" id='calendar'></div>
</main>  
</body>
